services:

  client:
    build: client/
    depends_on:
      - backend
    ports:
      - "5000:4200"
    volumes:
      - ./client:/App
      - /App/node_modules
  backend:
    build: backend/
    depends_on:
      - postgres
    expose:
      - "8080"
    ports:
      - "5005:5005"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - ./backend:/App
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./configs/nginx/proxy-common.inc:/etc/nginx/conf.d/proxy-common.inc:ro
  postgres:
    image: postgres:18.3-alpine3.22
    restart: always
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
