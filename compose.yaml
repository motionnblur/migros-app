services:

  client:
    build: client/
    depends_on:
      - backend
    environment:
      - NG_PROXY_TARGET=http://backend:8080
    ports:
      - "5000:4200"
    volumes:
      - ./client:/App
      - /App/node_modules
  backend:
    build: backend/
    depends_on:
      - postgres
    expose:
      - "8080"
    ports:
      - "5005:5005"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - APP_PUBLIC_BASE_URL=${APP_PUBLIC_BASE_URL}
      - APP_ALLOWED_ORIGINS=${APP_ALLOWED_ORIGINS}
      - APP_ALLOWED_ORIGIN_PATTERNS=${APP_ALLOWED_ORIGIN_PATTERNS}
      - APP_MAIL_PROVIDER=${APP_MAIL_PROVIDER}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - APP_MAIL_FROM=${APP_MAIL_FROM}
    volumes:
      - ./backend:/App
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./configs/nginx/proxy-common.inc:/etc/nginx/conf.d/proxy-common.inc:ro
  postgres:
    image: postgres:18.3-alpine3.22
    restart: always
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
