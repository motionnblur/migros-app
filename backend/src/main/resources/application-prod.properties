spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

auth.cookie.secure=${AUTH_COOKIE_SECURE:true}
auth.cookie.same-site=${AUTH_COOKIE_SAMESITE:None}

support.service.base-url=${SUPPORT_SERVICE_BASE_URL}
app.mail.provider=${APP_MAIL_PROVIDER:resend}

# Comma-separated allowed origins for HTTP CORS and WebSocket handshake
app.allowed-origins=${APP_ALLOWED_ORIGINS}
app.allowed-origin-patterns=${APP_ALLOWED_ORIGIN_PATTERNS:}
app.public-base-url=${APP_PUBLIC_BASE_URL}
