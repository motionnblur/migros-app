spring.application.name=MigrosBackend
server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql = false
spring.jpa.hibernate.naming.implicit-strategy = org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
resend.api.key=${RESEND_API_KEY}
app.mail.from=${APP_MAIL_FROM}

logging.file.name=./logs/authentication-failures.log

stripe.api.key=${STRIPE_API_KEY}
# Auth cookie settings
auth.cookie.secure=${AUTH_COOKIE_SECURE}
auth.cookie.same-site=${AUTH_COOKIE_SAMESITE}

# Support service integration
support.service.base-url=${SUPPORT_SERVICE_BASE_URL}
support.service.internal-key=${SUPPORT_SERVICE_INTERNAL_KEY}

support.internal.key=${SUPPORT_INTERNAL_KEY}

# Comma-separated allowed origins for HTTP CORS and WebSocket handshake
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5000}
app.public-base-url=${APP_PUBLIC_BASE_URL}

# Upload directory for product images (set to persistent disk path on Render)
app.upload-dir=${APP_UPLOAD_DIR:UploadFolder}

jwt.secret=${JWT_SECRET}