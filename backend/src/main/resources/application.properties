spring.application.name=MigrosBackend
spring.profiles.default=local
server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql = false
spring.jpa.hibernate.naming.implicit-strategy = org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
app.mail.provider=${APP_MAIL_PROVIDER:auto}
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${APP_MAIL_FROM:no-reply@localhost}

logging.file.name=./logs/authentication-failures.log

stripe.api.key=${STRIPE_API_KEY:}
support.service.internal-key=${SUPPORT_SERVICE_INTERNAL_KEY:}

support.internal.key=${SUPPORT_INTERNAL_KEY:}

# Upload directory for product images (set to persistent disk path on Render)
app.upload-dir=${APP_UPLOAD_DIR:UploadFolder}

jwt.secret=${JWT_SECRET:local-dev-secret-change-me}
