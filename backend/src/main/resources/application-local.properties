spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/migros_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1}

auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAMESITE:Lax}

support.service.base-url=${SUPPORT_SERVICE_BASE_URL:http://localhost:3000}
app.mail.provider=${APP_MAIL_PROVIDER:smtp}

# Comma-separated allowed origins for HTTP CORS and WebSocket handshake
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5000}
app.allowed-origin-patterns=${APP_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:4200}
