<div class="main-page d-flex flex-column min-vh-100 bg-light">

  <header class="bg-white shadow-sm sticky-top">
    <div class="container py-3">
      <div class="d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">

        <a class="logo-link" href="#" (click)="setItemPageOpened(false); $event.preventDefault()">
          <img src="migros_header.png" height="40" alt="Logo" class="d-block">
        </a>

        <div class="d-flex align-items-center gap-2 gap-md-3">

          <button class="btn btn-outline-secondary rounded-pill px-3 px-md-4 fw-medium btn-sm"
                  (click)="openOrderComponent()">
            <i class="bi bi-truck me-1 me-md-2"></i>
            <span class="d-none d-sm-inline">Siparis Takibi</span>
          </button>

          <div class="user-auth-area">
            <button *ngIf="!isUserLoggedIn()"
                    class="btn btn-primary rounded-pill px-4 fw-bold btn-sm shadow-sm animate-fade-in"
                    (click)="openLoginComponent()">
              <i class="bi bi-box-arrow-in-right me-1"></i> {{ loginText }}
            </button>

            <div class="dropdown" *ngIf="isUserLoggedIn()">
              <button
                class="btn btn-light border rounded-pill px-3 px-md-4 fw-bold btn-sm dropdown-toggle animate-fade-in"
                type="button" (click)="toggleMenu($event)">
                <i class="bi bi-person-circle me-1 me-md-2 text-primary"></i>
                <span class="user-name-text">{{ loginText }}</span>
              </button>

              <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"
                  [ngClass]="{ 'show': isMenuOpen }"
                  style="position: absolute; right: 0; min-width: 180px;">
                <li>
                  <a class="dropdown-item py-2 d-flex align-items-center" (click)="openCartComponent()">
                    <i class="bi bi-cart3 me-2 text-muted"></i>Sepetim
                  </a>
                </li>
                <li>
                  <a class="dropdown-item py-2 d-flex align-items-center" (click)="openProfileComponent()">
                    <i class="bi bi-person me-2 text-muted"></i>Profilim
                  </a>
                </li>
                <li>
                  <a class="dropdown-item py-2 d-flex align-items-center" (click)="openOrderHistoryComponent()">
                    <i class="bi bi-receipt me-2 text-muted"></i>Siparislerim
                  </a>
                </li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li>
                  <a class="dropdown-item py-2 text-danger d-flex align-items-center" (click)="logoutUser()">
                    <i class="bi bi-box-arrow-right me-2"></i>Cikis Yap
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-orange" style="height: 4px;"></div>

    <div class="bg-light-gray border-bottom overflow-hidden d-none d-md-block">
      <div class="container-fluid p-0">
        <img src="migros_header2.png" class="img-fluid w-100 d-block" style="max-height: 80px; object-fit: cover;">
      </div>
      <div class="bg-white py-2 text-center border-bottom shadow-sm">
        <img src="migros_header_bottom.png" class="img-fluid" style="max-height: 40px;">
      </div>
    </div>
  </header>

  <main class="flex-grow-1">
    <div class="container py-4">
      <app-discover *ngIf="!hasItemPageOpened()"/>
      <app-product-page *ngIf="hasItemPageOpened()"/>
    </div>
  </main>

  <footer class="bg-white border-top mt-auto py-5">
    <div class="container">
      <div class="text-center mb-5">
        <img src="footer/migros-footer-main.png" class="img-fluid rounded shadow-sm" alt="Footer Content">
      </div>
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center border-top pt-4 gap-3">
        <img src="footer/migros-footer.png" class="img-fluid" style="max-height: 40px;">
        <img src="footer/migros-footer2.png" class="img-fluid" style="max-height: 35px;">
      </div>
    </div>
  </footer>

  <button class="live-support-btn" type="button" (click)="toggleSupportChat()">
    <i class="bi bi-chat fs-2"></i>
  </button>

  <div class="live-support-chat" *ngIf="isSupportChatOpen">
    <div class="chat-header">
      <strong>Canli Destek</strong>
      <button type="button" class="btn btn-sm btn-light" (click)="toggleSupportChat()">Kapat</button>
    </div>

    <div class="chat-body">
      <div class="chat-info" *ngIf="isSupportLoading">Yukleniyor...</div>
      <div class="chat-info text-danger" *ngIf="supportErrorMessage">{{ supportErrorMessage }}</div>

      <div class="chat-message" *ngFor="let message of supportMessages" [ngClass]="{ 'management': message.sender === 'MANAGEMENT' }">
        <div class="chat-message-meta">{{ message.sender === 'MANAGEMENT' ? 'Yonetim' : 'Siz' }}</div>
        <div class="chat-message-content">{{ message.message }}</div>
      </div>
    </div>

    <div class="chat-footer">
      <input
        type="text"
        [(ngModel)]="supportMessageInput"
        class="form-control form-control-sm"
        placeholder="Mesajinizi yazin..."
        (keydown.enter)="sendSupportMessage()"
      />
      <button type="button" class="btn btn-sm btn-warning" [disabled]="isSupportSending" (click)="sendSupportMessage()">
        Gonder
      </button>
    </div>
  </div>

  <app-sign-user *ngIf="isLoginButtonClicked && !isUserSigned"
                 (closeComponentEvent)="closeLoginComponent()"
                 (userLoginEvent)="loginUser()"/>

  <app-user-cart *ngIf="isCartComponentOpened"
                 (closeComponentEvent)="closeCartComponent()"/>

  <app-user-profile *ngIf="isProfileButtonClicked"
                    (closeComponentEvent)="closeProfileComponent()"/>

  <app-order-tracker *ngIf="isOrderButtonClicked"
                     [orderIds]="orderIds"
                     (closeOrderTrackerComponentEvent)="closeOrderTrackerComponent()"/>

  <app-order-history *ngIf='isOrderHistoryOpened'
                     (closeOrderHistoryComponentEvent)='closeOrderHistoryComponent()'/>
</div>
