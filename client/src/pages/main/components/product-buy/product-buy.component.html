<div class="container-fluid p-0 animate-fade-in" *ngIf="productData">
  <div class="row g-4">

    <div class="col-12 col-md-5 col-lg-4">
      <div class="card border shadow-sm p-4 d-flex justify-content-center align-items-center bg-white"
           style="min-height: 400px; border-radius: 12px;">
        <img #product_image_ref
             class="img-fluid"
             style="max-height: 350px; object-fit: contain;"
             [alt]="productData.productName"/>
      </div>
    </div>

    <div class="col-12 col-md-7 col-lg-8">
      <div class="card border shadow-sm h-100" style="border-radius: 12px;">
        <div class="card-body p-4 d-flex flex-column">

          <div class="mb-4 pb-3 border-bottom">
            <h2 class="fw-bold text-dark mb-2">{{ productData.productName }}</h2>
            <div class="d-flex align-items-baseline">
              <span class="display-5 fw-bold text-orange me-1">{{ productData.productPrice }}</span>
              <span class="fs-4 text-orange fw-medium">TL</span>
            </div>
          </div>

          <div class="mb-4 border-bottom pb-3">
            <img src="moneyy.png" class="img-fluid rounded" alt="Kampanya" style="max-height: 60px;">
          </div>

          <div class="row align-items-center mb-4">
            <div class="col-auto">
              <span class="fw-bold text-muted text-uppercase small d-block mb-1">Miktar</span>
              <div class="d-flex align-items-center bg-light rounded px-2" style="height: 50px; width: 120px;">
                <span class="mx-auto fw-bold">1 Adet</span>
              </div>
            </div>
            <div class="col">
              <button class="btn btn-orange w-100 fw-bold shadow-sm mt-4"
                      style="height: 55px; font-size: 1.1rem;"
                      (click)="addProductToUserCart()">
                <i class="bi bi-cart-plus me-2"></i>Sepete Ekle
              </button>
            </div>
          </div>

          <div class="mt-auto p-3 bg-light rounded border-start border-orange border-4">
            <p class="small text-muted mb-0 lh-sm">
              Ürünün stok, fiyat ve kampanya bilgisi, teslimatı gerçekleştirecek mağazanın güncel verilerine göre
              değişiklik gösterebilir.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 mt-4">
      <div class="card border shadow-sm" style="border-radius: 12px;">
        <div class="card-header bg-white border-bottom-0 p-0">
          <ul class="nav nav-tabs border-0 px-3 pt-2" *ngIf="productDescriptions">
            <li class="nav-item" *ngFor="let item of productDescriptions.descriptionList; let i = index">
              <button class="nav-link border-0 fw-bold px-4 py-3"
                      [class.active]="selectedTabIndex === i"
                      (click)="onTabClick(i)">
                {{ item.descriptionTabName }}
              </button>
            </li>
          </ul>
        </div>
        <div class="card-body p-4 border-top">
          <div [innerHTML]="currentProductDescriptionBody" class="product-description-content">
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
