<div id="cart-overlay" (click)="closeCartComponent()"></div>

<div id="cart-container" class="card shadow-lg border-0 animate-fade-in">

  <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <i class="bi bi-cart3 text-orange fs-4 me-2"></i>
      <h5 class="mb-0 fw-bold">Sepetim</h5>
    </div>
    <button type="button" class="btn-close" (click)="closeCartComponent()"></button>
  </div>

  <div class="card-body p-0">
    <div *ngIf="items.length === 0" class="text-center py-5 text-muted">
      <i class="bi bi-cart-x fs-1 d-block mb-2"></i>
      Sepetiniz henuz bos.
    </div>

    <div *ngFor="let item of items; let i = index" class="cart-item p-3 border-bottom">
      <div class="row align-items-center g-3">
        <div class="col-auto">
          <img [src]="item.productImageUrl || 'assets/placeholder.png'"
               class="rounded border shadow-sm"
               width="70" height="70"
               style="object-fit: contain; background: white;">
        </div>

        <div class="col">
          <div class="fw-bold text-dark text-truncate" style="max-width: 200px;" [title]="item.productName">
            {{ item.productName }}
          </div>
          <div class="text-orange fw-bold fs-5">{{ item.productPrice }} TL</div>
          <div class="small" [ngClass]="item.availableStock > 0 ? 'text-success' : 'text-danger'">
            Stok: {{ item.availableStock }}
          </div>
        </div>

        <div class="col-auto">
          <button class="btn btn-outline-danger btn-sm border-0" (click)="removeProductFromUserCart(item.productId)">
            <i class="bi bi-trash3 fs-5"></i>
          </button>
        </div>
      </div>

      <div class="row mt-2">
        <div class="col d-flex justify-content-end">
          <div class="input-group input-group-sm" style="width: 140px;">
            <button class="btn btn-orange" (click)="decreaseProductCount(item.productId)">
              <i class="bi bi-dash-lg"></i>
            </button>
            <span class="input-group-text bg-white border-top border-bottom flex-grow-1 justify-content-center fw-bold">
              {{ item.productCount }}
            </span>
            <button class="btn btn-orange" [disabled]="item.productCount >= item.availableStock" (click)="increaseProductCount(item.productId)">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer bg-light p-3 border-top">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted fw-medium">Toplam Tutar:</span>
      <span class="fs-3 fw-bold text-orange">{{ totalPrice }} TL</span>
    </div>

    <button
      #buyButton
      class="btn btn-orange w-100 py-3 fw-bold shadow-sm"
      [disabled]="items.length === 0"
      (click)="openPaymentComponent()">
      {{ items.length > 0 ? (isCartConfirmed ? 'Siparisi Tamamla' : 'Sepeti Onayla') : 'Sepet Bos' }}
    </button>
  </div>

  <app-payment
    *ngIf='isPaymentPhaseActive'
    (closePaymentComponentEvent)='closePaymentComponent()'
    (paymentSuccess)='handlePaymentSuccess()'
  />
</div>
