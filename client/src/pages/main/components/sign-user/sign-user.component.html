<div id="login-component" (click)="closeComponent($event)">
  <!-- Sign Up Phase -->
  <div *ngIf="isSignPhaseActive" id="login-component-content" class="p-4 border rounded shadow-sm bg-light">
    <h4 class="mb-3">Üye Ol</h4>
    <form>
      <!-- Email -->
      <div class="mb-3">
        <label for="loginEmail" class="form-label">E-Posta</label>
        <input
          type="email"
          class="form-control"
          id="loginEmail"
          placeholder="Enter email"
          required
          [(ngModel)]="userMail"
          name="email"
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="loginPassword" class="form-label">Şifre Oluştur</label>
        <input
          [type]="passwordVisible ? 'text' : 'password'"
          class="form-control"
          id="loginPassword"
          [(ngModel)]="userPassword"
          name="password"
        />
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 mt-4 me-2"
          (click)="passwordVisible = !passwordVisible"
        >
          <i class="bi" [ngClass]="passwordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label for="loginPasswordConfirm" class="form-label">Şifreyi Onayla</label>
        <input
          [type]="passwordVisible ? 'text' : 'password'"
          class="form-control"
          id="loginPasswordConfirm"
          [(ngModel)]="userPasswordConfirm"
          name="passwordConfirm"
        />
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 mt-4 me-2"
          (click)="passwordVisible = !passwordVisible"
        >
          <i class="bi" [ngClass]="passwordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <!-- Submit -->
      <button id="login-button" type="button" class="btn btn-primary w-100" (click)="signUser()">
        Üye Ol
      </button>

      <div id="login-text" class="mt-3 text-center">
        Zaten üyeysen
        <span class="text-warning fw-bold" style="cursor: pointer" (click)="openSign()">Giriş Yap</span>
      </div>
    </form>
  </div>

  <!-- Login Phase -->
  <div *ngIf="!isSignPhaseActive" id="login-component-content" class="p-4 border rounded shadow-sm bg-light">
    <h4 class="mb-3">Giriş Yap</h4>
    <form>
      <!-- Email -->
      <div class="mb-3">
        <label for="loginEmail2" class="form-label">E-Posta</label>
        <input
          type="email"
          class="form-control"
          id="loginEmail2"
          [(ngModel)]="userMail"
          name="emailLogin"
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="loginPassword2" class="form-label">Şifre</label>
        <input
          [type]="passwordVisible ? 'text' : 'password'"
          class="form-control"
          id="loginPassword2"
          [(ngModel)]="userPassword"
          name="passwordLogin"
        />
        <button
          type="button"
          class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 mt-4 me-2"
          (click)="passwordVisible = !passwordVisible"
        >
          <i class="bi" [ngClass]="passwordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
        </button>
      </div>

      <!-- Submit -->
      <button id="login-button" type="button" class="btn btn-success w-100" (click)="loginUser()">
        Giriş Yap
      </button>

      <div id="login-text" class="mt-3 text-center">
        Üye değilsen
        <span class="text-warning fw-bold" style="cursor: pointer" (click)="openLogin()">Üye Ol</span>
      </div>
    </form>
  </div>
</div>
