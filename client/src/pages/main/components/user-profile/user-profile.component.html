<div id="user-profile-overlay" (click)="closeProfileComponent()"></div>

<div id="user-profile-container" class="card shadow-lg border-0">
  <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
    <h4 class="mb-0 fw-bold text-primary">Kullanıcı Profili</h4>
    <button type="button" class="btn-close" (click)="closeProfileComponent()"></button>
  </div>

  <div class="card-body p-4">
    <form>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">İsim</label>
          <input type="text" class="form-control" [(ngModel)]="userFirstName" name="firstName" placeholder="Adınız">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Soy İsim</label>
          <input type="text" class="form-control" [(ngModel)]="userLastName" name="lastName" placeholder="Soyadınız">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Adres 1</label>
        <textarea class="form-control" rows="2" [(ngModel)]="userAddress" name="address"
                  placeholder="Açık adresiniz..."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Adres 2 (Opsiyonel)</label>
        <textarea class="form-control" rows="2" [(ngModel)]="userAddress2" name="address2"></textarea>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Şehir</label>
          <input type="text" class="form-control" [(ngModel)]="userTown" name="town">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Ülke</label>
          <input type="text" class="form-control" [(ngModel)]="userCountry" name="country">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Posta Kodu</label>
          <div class="position-relative">
            <input type="text" class="form-control" maxlength="5" [(ngModel)]="userPostalCode" name="postalCode"
                   #postalCodeInput>
            <div class="form-text text-end">{{ postalCodeInput.value.length }}/5</div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary px-4" (click)="closeProfileComponent()">Vazgeç</button>
        <button type="button" class="btn btn-primary px-5 fw-bold shadow-sm" (click)="uploadTableData()">Kaydet</button>
      </div>
    </form>
  </div>
</div>
