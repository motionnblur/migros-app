<div class="category-button" (click)="openItemPage()">
  <div class="category-button__image__container">
    <img
      class="category-button__image"
      [src]="supabaseImageUrl(image)"
      (error)="onImageError($event)"
    />
  </div>

  <div class="category-button__title">{{ name }}</div>
</div>
