<div class="card h-100 product-card shadow-sm border-0 transition-hover">
  <div class="product-img-wrapper p-3" (click)="onProductViewClicked()">
    <img
      [src]="imageUrl || 'assets/placeholder.png'"
      class="card-img-top img-fluid"
      [alt]="productName"
    />
  </div>

  <div class="card-body d-flex flex-column pt-0">
    <h6 class="card-title text-dark mb-1 text-truncate" (click)="onProductViewClicked()" title="{{ productName }}">
      {{ productName }}
    </h6>

    <div class="small mb-2" [ngClass]="productCount > 0 ? 'text-success' : 'text-danger'">
      {{ productCount > 0 ? ('Stok: ' + productCount) : 'Tukendi' }}
    </div>

    <div class="mt-auto d-flex justify-content-between align-items-center">
      <div class="product-price">
        <span class="fs-5 fw-bold text-orange">{{ productPrice }}</span>
        <span class="ms-1 small text-orange fw-semibold">TL</span>
      </div>

      <button
        type="button"
        class="btn btn-orange-action rounded-circle d-flex align-items-center justify-content-center shadow-sm"
        [disabled]="productCount <= 0"
        (click)="addProductToUserCart()"
        title="Sepete Ekle">
        <i class="bi bi-plus-lg text-white"></i>
      </button>
    </div>
  </div>
</div>
