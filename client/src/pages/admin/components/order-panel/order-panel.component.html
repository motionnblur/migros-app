<div id="order-panel-main">
  <div id="order-panel-body">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <!--- Note that these columns can be defined in any order.
          The actual rendered columns are set as a property on the row definition" -->

      <!-- Position Column -->
      <ng-container matColumnDef="orderId">
        <th mat-header-cell *matHeaderCellDef>Ürün id</th>
        <td mat-cell *matCellDef="let element">{{ element.orderId }}</td>
      </ng-container>

      <ng-container matColumnDef="totalPrice">
        <th mat-header-cell *matHeaderCellDef>Toplam fiyat</th>
        <td mat-cell *matCellDef="let element">{{ element.totalPrice }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Sipariş durumu</th>
        <td mat-cell *matCellDef="let element">{{ element.status }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Eylemler</th>
        <td mat-cell *matCellDef="let element">
          <div
            class="order-actions"
            (click)="openActionPanel(element.orderId)"
          ></div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <div id="order-panel-bottom">
    <mat-paginator
      [length]="1"
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 15]"
    />
  </div>
</div>
<div *ngIf="isOrderComponentOpen" id="order-component">Open</div>
<app-action-panel
  *ngIf="isActionPanelOpen"
  [orderId]="orderId"
  (closeActionPanelEvent)="closeActionPanel()"
/>
